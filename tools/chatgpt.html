<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatGPT 详细介绍 - AI工具大全</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        tech: {
                            primary: '#0E74FF',
                            darkBg: '#111827',
                            darkCard: '#1F2937'
                        }
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto { content-visibility: auto; }
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-tech-darkBg text-gray-800 dark:text-gray-100">
<!-- 导航 -->
<header class="sticky top-0 z-50 bg-white/90 dark:bg-tech-darkBg/90 backdrop-blur-md border-b border-gray-200 dark:border-gray-800">
    <div class="container mx-auto px-4 py-3 flex justify-between items-center">
        <a href="/" class="text-xl font-semibold text-tech-primary">AI工具大全</a>
        <nav class="hidden md:flex items-center gap-6 text-sm">
            <a href="/" class="hover:text-tech-primary transition-colors">首页</a>
            <a href="/ai-platforms.html" class="text-tech-primary font-medium border-b-2 border-tech-primary pb-1">AI平台</a>
            <a href="/about.html" class="hover:text-tech-primary transition-colors">关于</a>
        </nav>
        <button id="darkBtn" class="text-lg">🌓</button>
    </div>
</header>

<!-- 内容主体 -->
<main class="container mx-auto px-4 py-10 max-w-3xl">
    <div class="bg-white dark:bg-tech-darkCard rounded-2xl p-6 shadow-md">
        <div class="flex items-center gap-3 mb-6">
            <div class="w-12 h-12 rounded-full bg-tech-primary/10 flex items-center justify-center text-tech-primary font-bold text-lg">GPT</div>
            <div>
                <h1 class="text-2xl font-bold">ChatGPT</h1>
                <p class="text-gray-500 dark:text-gray-400">全能AI对话、写作、编程、学习助手</p>
            </div>
        </div>

        <h2 class="text-lg font-semibold mt-6 mb-2">📌 工具简介</h2>
        <p class="text-gray-600 dark:text-gray-300">ChatGPT 是OpenAI推出的大型人工智能语言模型，支持日常对话、文案创作、代码编写、学习答疑、思路策划等，用途覆盖学习、工作、创业、编程全场景。</p>

        <h2 class="text-lg font-semibold mt-6 mb-2">✨ 主要功能</h2>
        <ul class="list-disc pl-5 text-gray-600 dark:text-gray-300 space-y-1">
            <li>日常聊天、情感陪伴、问答解惑</li>
            <li>文案、文案、短视频脚本、公众号文章写作</li>
            <li>编程写代码、查错、解释代码逻辑</li>
            <li>学习辅导、知识点讲解、备考刷题</li>
            <li>创业思路、项目策划、文案优化</li>
        </ul>

        <h2 class="text-lg font-semibold mt-6 mb-2">🔗 官方入口</h2>
        <p class="text-tech-primary">官网：chat.openai.com</p>
    </div>

    <div class="mt-6">
        <a href="/ai-platforms.html" class="inline-block px-4 py-2 bg-tech-primary text-white rounded-lg">← 返回AI平台列表</a>
    </div>
</main>

<script>
// 明暗模式
const darkBtn = document.getElementById('darkBtn');
if(localStorage.getItem('dark') === 'true'){
    document.documentElement.classList.add('dark');
}
darkBtn.addEventListener('click',()=>{
    document.documentElement.classList.toggle('dark');
    localStorage.setItem('dark', document.documentElement.classList.contains('dark'));
});
</script>
</body>
</html>
