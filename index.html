<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI工具大全 - 极简高效AI导航站</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/main.js" defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: {
                colors: { tech: { primary: '#0E74FF', dark: '#0F172A' }},
                fontFamily: { inter: ['Inter', 'sans-serif'] }
            }}
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .tech-gradient { background: linear-gradient(135deg, #0E74FF, #06B6D4); }
            .card-mini { background: white; border-radius:16px; box-shadow:0 4px 20px rgba(14,116,255,0.06); transition:0.3s; }
            .card-mini:hover { transform:translateY(-4px); box-shadow:0 8px 24px rgba(14,116,255,0.12); }
            .dark .card-mini { background:#1E293B; }
            .text-gradient { background:linear-gradient(135deg,#0E74FF,#06B6D4); -webkit-background-clip:text; color:transparent; }
        }
    </style>
</head>
<body>
<div id="progress-bar"></div>

<!-- 极简导航 -->
<header class="sticky top-0 z-50 bg-white/90 dark:bg-tech-dark/90 backdrop-blur-md border-b border-slate-200 dark:border-slate-700/20">
    <div class="container mx-auto px-4 py-4 flex justify-between items-center">
        <a href="/" class="text-xl font-semibold text-gradient">AI工具大全</a>

            <a href="/ai-platforms.html">AI平台</a>

            <a href="/sidejob.html">副业</a>

            <button onclick="toggleDark()">🌓</button>
            <button class="md:hidden" onclick="openMenu()">☰</button>
        </div>
    </div>
</header>

<!-- 移动端菜单 -->
<div class="mobile-menu">
    <div class="flex justify-between items-center mb-6">
        <span class="font-medium">菜单</span>
        <button onclick="closeMenu()">✕</button>
    </div>
    <div class="flex flex-col gap-3 text-sm">
        <a href="/" class="text-tech-primary">首页</a>
        <a href="/ai-platforms.html">AI平台</a>
        <a href="/tutorials.html">教程</a>
        <a href="/sidejob.html">副业</a>

</div>

            <a href="/chat.html" class="card-mini p-4 text-center">

                <p class="text-xs font-medium">对话大模型</p>

            <a href="/office.html" class="card-mini p-4 text-center">

            <a href="/copy.html" class="card-mini p-4 text-center">

                </div>
                <p class="text-xs font-medium">豆包AI</p>

            <div class="card-mini p-4 text-center opacity-70">
                <div class="w-12 h-12 mx-auto rounded-full bg-indigo-100 flex items-center justify-center mb-2">

                </div>

            </div>
            <div class="card-mini p-4 text-center opacity-70">

                </div>

                    <span class="text-red-500 font-medium">文心</span>

<footer class="py-6 text-center text-xs text-slate-400">

<div id="backTop" onclick="backToTop()" class="fixed bottom-6 right-6 w-10 h-10 rounded-full tech-gradient text-white flex items-center justify-center shadow-lg opacity-0 invisible transition-all"></div>
