<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI工具大全 - 极简高效AI导航站</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        tech: {
                            primary: '#0E74FF',
                            darkBg: '#111827',
                            darkCard: '#1F2937',
                            darkText: '#F3F4F6'
                        }
                    },
                    fontFamily: {
                        inter: ['Inter', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .card-category {
                background: white;
                border-radius: 16px;
                box-shadow: 0 2px 12px rgba(14,116,255,0.06);
                border: 1px solid rgba(148,163,184,0.1);
                transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            }
            .card-category:hover {
                transform: translateY(-3px);
                box-shadow: 0 6px 20px rgba(14,116,255,0.12);
                border-color: rgba(14,116,255,0.2);
            }
            .card-tool {
                background: white;
                border-radius: 16px;
                box-shadow: 0 2px 12px rgba(14,116,255,0.06);
                border: 1px solid rgba148,163,184,0.1;
                transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            }
            .card-tool:hover {
                transform: translateY(-3px);
                box-shadow: 0 6px 20px rgba(14,116,255,0.12);
                border-color: rgba(14,116,255,0.2);
            }
            .dark .card-category, .dark .card-tool {
                background: #1F2937;
                border-color: rgba(75,85,99,0.3);
                box-shadow: 0 2px 12px rgba(0,0,0,0.2);
            }
            .dark .card-category:hover, .dark .card-tool:hover {
                border-color: rgba(14,116,255,0.3);
                box-shadow: 0 6px 20px rgba(0,0,0,0.3);
            }
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-tech-darkBg text-gray-800 dark:text-tech-darkText transition-colors duration-300">

<!-- 导航栏 已删掉：教程、副业、成功案例 -->
<header class="sticky top-0 z-50 bg-white/90 dark:bg-tech-darkBg/90 backdrop-blur-md border-b border-gray-100 dark:border-gray-800">
    <div class="container mx-auto px-4 py-3 flex justify-between items-center">
        <a href="/" class="text-xl font-semibold text-tech-primary">AI工具大全</a>
        <nav class="hidden md:flex items-center gap-6 text-sm text-gray-600 dark:text-gray-300">
            <a href="/" class="text-tech-primary font-medium border-b-2 border-tech-primary pb-1">首页</a>
            <a href="/ai-platforms.html" class="hover:text-tech-primary transition-colors">AI平台</a>
            <a href="/contact.html" class="hover:text-tech-primary transition-colors">关于</a>
        </nav>
        <div class="flex items-center gap-3">
            <button onclick="toggleDark()" class="text-lg hover:scale-110 transition-transform">🌓</button>
            <button class="md:hidden text-lg" onclick="openMenu()">☰</button>
        </div>
    </div>
</header>

<!-- 移动端菜单 同样删掉多余入口 -->
<div class="mobile-menu fixed inset-0 z-50 bg-white dark:bg-tech-darkBg p-6 transform translate-x-full transition-transform duration-300">
    <div class="flex justify-between items-center mb-6">
        <span class="font-medium text-gray-800 dark:text-white">菜单</span>
        <button onclick="closeMenu()" class="text-xl">✕</button>
    </div>
    <div class="flex flex-col gap-4 text-sm">
        <a href="/" class="py-2 border-b border-gray-100 dark:border-gray-800 text-tech-primary font-medium">首页</a>
        <a href="/ai-platforms.html" class="py-2 border-b border-gray-100 dark:border-gray-800 hover:text-tech-primary">AI平台</a>
        <a href="/contact.html" class="py-2 hover:text-tech-primary">关于</a>
    </div>
</div>
<div class="menu-mask fixed inset-0 bg-black/50 z-40 hidden" onclick="closeMenu()"></div>

<main class="container mx-auto px-4 py-12 max-w-4xl">

    <!-- 首页Banner -->
    <section class="text-center mb-16">
        <h1 class="text-3xl md:text-4xl font-light text-gray-800 dark:text-white mb-3 tracking-tight">发现高效AI工具，提升创造力</h1>
        <p class="text-gray-500 dark:text-gray-400 text-sm max-w-xl mx-auto">极简收录、清晰分类、每个工具自带教程案例，零基础直接上手</p>
    </section>

    <!-- 八大分类入口 -->
    <section class="mb-16">

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6">
            <a href="/ai-platforms.html#chat" class="card-category p-5 text-center">
                <div class="text-2xl mb-2">💬</div>
                <p class="text-xs font-medium text-gray-700 dark:text-gray-300">对话大模型</p>
            </a>
            <a href="/ai-platforms.html#office" class="card-category p-5 text-center">
                <div class="text-2xl mb-2">📑</div>
                <p class="text-xs font-medium text-gray-700 dark:text-gray-300">办公效率</p>
            </a>
            <a href="/ai-platforms.html#copy" class="card-category p-5 text-center">
                <div class="text-2xl mb-2">✍️</div>
                <p class="text-xs font-medium text-gray-700 dark:text-gray-300">文案创作</p>
            </a>
            <a href="/ai-platforms.html#draw" class="card-category p-5 text-center">
                <div class="text-2xl mb-2">🎨</div>
                <p class="text-xs font-medium text-gray-700 dark:text-gray-300">绘画设计</p>
            </a>
            <a href="/ai-platforms.html#video" class="card-category p-5 text-center">
                <div class="text-2xl mb-2">🎬</div>
                <p class="text-xs font-medium text-gray-700 dark:text-gray-300">视频剪辑</p>
            </a>
            <a href="/ai-platforms.html#study" class="card-category p-5 text-center">
                <div class="text-2xl mb-2">📚</div>
                <p class="text-xs font-medium text-gray-700 dark:text-gray-300">学习教育</p>
            </a>
            <a href="/ai-platforms.html#code" class="card-category p-5 text-center">
                <div class="text-2xl mb-2">💻</div>
                <p class="text-xs font-medium text-gray-700 dark:text-gray-300">编程开发</p>
            </a>
            <a href="/ai-platforms.html#audio" class="card-category p-5 text-center">
                <div class="text-2xl mb-2">🔊</div>
                <p class="text-xs font-medium text-gray-700 dark:text-gray-300">音频配音</p>
            </a>
        </div>
    </section>

    <!-- 热门工具精选 -->
    <section class="mb-16">
        <h2 class="text-lg font-medium text-gray-700 dark:text-gray-200 mb-8 text-center">热门工具精选</h2>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6">
            <a href="/tools/doubao.html" class="card-tool p-5 text-center">
                <div class="w-12 h-12 mx-auto rounded-full bg-tech-primary/10 dark:bg-tech-primary/20 flex items-center justify-center mb-3">
                    <span class="text-tech-primary font-medium">豆包</span>
                </div>
                <p class="text-xs font-medium text-gray-700 dark:text-gray-300">豆包AI</p>
            </a>
            <div class="card-tool p-5 text-center opacity-70">
                <div class="w-12 h-12 mx-auto rounded-full bg-indigo-100 dark:bg-indigo-900/30 flex items-center justify-center mb-3">
                    <span class="text-indigo-500 font-medium">Kimi</span>
                </div>
                <p class="text-xs font-medium text-gray-700 dark:text-gray-300">Kimi AI</p>
            </div>
            <div class="card-tool p-5 text-center opacity-70">
                <div class="w-12 h-12 mx-auto rounded-full bg-amber-100 dark:bg-amber-900/30 flex items-center justify-center mb-3">
                    <span class="text-amber-500 font-medium">千问</span>
                </div>
                <p class="text-xs font-medium text-gray-700 dark:text-gray-300">通义千问</p>
            </div>
            <div class="card-tool p-5 text-center opacity-70">
                <div class="w-12 h-12 mx-auto rounded-full bg-red-100 dark:bg-red-900/30 flex items-center justify-center mb-3">
                    <span class="text-red-500 font-medium">文心</span>
                </div>
                <p class="text-xs font-medium text-gray-700 dark:text-gray-300">文心一言</p>
            </div>
        </div>
    </section>

    <!-- 底部标语 -->
    <section class="text-center text-gray-400 dark:text-gray-500 text-xs tracking-wider mb-10">
        简约 · 高效 · 实用 · 持续更新
    </section>
</main>

<footer class="py-6 text-center text-xs text-gray-400 dark:text-gray-500">
    © 2026 AI工具大全
</footer>

<script>
    // 明暗模式
    function toggleDark() {
        document.documentElement.classList.toggle('dark');
        localStorage.setItem('dark', document.documentElement.classList.contains('dark'));
    }
    if (localStorage.getItem('dark') === 'true') document.documentElement.classList.add('dark');

    // 移动端菜单
    function openMenu() {
        document.querySelector('.mobile-menu').classList.remove('translate-x-full');
        document.querySelector('.menu-mask').classList.remove('hidden');
    }
    function closeMenu() {
        document.querySelector('.mobile-menu').classList.add('translate-x-full');
        document.querySelector('.menu-mask').classList.add('hidden');
    }
</script>

</body>
</html>
